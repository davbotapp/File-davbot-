<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koshibar Tunnel - V2Ray</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
padding-bottom:80px;
}

.header{
height:70px;
background:#222;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid #444;
}

.logo{
font-size:38px;
font-weight:700;
}

.logo span{
color:#a4d233;
}

.container{
padding:20px;
}

.label{
font-size:18px;
margin-bottom:8px;
}

.input{
width:100%;
background:#111;
border:2px solid #444;
border-radius:10px;
padding:15px;
color:white;
font-size:18px;
margin-bottom:20px;
outline:none;
}

.section-title{
font-size:22px;
font-weight:700;
margin:25px 0 15px;
padding-bottom:10px;
border-bottom:2px solid #666;
}

.row{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
border-radius:50px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#a4d233;
}

input:checked + .slider:before{
transform:translateX(26px);
}

select{
width:100%;
background:#111;
border:2px solid #444;
border-radius:10px;
padding:15px;
color:white;
font-size:18px;
margin-bottom:20px;
}

.save-btn{
width:100%;
padding:16px;
background:#7b00ff;
border:none;
border-radius:12px;
color:white;
font-size:18px;
font-weight:600;
margin-top:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#1a1a1a;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

.nav-item{
text-align:center;
color:#999;
font-size:14px;
}

.active{
color:#a4d233;
font-weight:700;
}

</style>
</head>
<body>

<div class="header">

<div class="logo">
<span>e</span>V2ray
</div>

<div>⋮</div>

</div>

<div class="container">

<div class="label">ID :</div>

<input
class="input"
id="uuid"
placeholder="Vless User ID">

<div class="row">

<span style="font-size:22px;">Mux</span>

<label class="switch">
<input type="checkbox" id="mux">
<span class="slider"></span>
</label>

</div>

<div class="section-title">
WS Settings
</div>

<div class="label">
Network :
</div>

<select id="network">

<option>WS</option>

<option>TCP</option>

<option>GRPC</option>

<option>HTTPUPGRADE</option>

</select>

<div class="row">

<span style="font-size:22px;">
TLS
</span>

<label class="switch">
<input type="checkbox" id="tls">
<span class="slider"></span>
</label>

<span style="font-size:22px;">
Insecure
</span>

<label class="switch">
<input type="checkbox" id="insecure">
<span class="slider"></span>
</label>

</div>

<div class="label">
Host :
</div>

<input
class="input"
id="host"
placeholder="Host header request">

<div class="label">
Path :
</div>

<input
class="input"
id="path"
placeholder="/vless">

<div class="label">
SNI :
</div>

<input
class="input"
id="sni"
placeholder="Server Name">

<button
class="save-btn"
onclick="saveV2ray()">
SAVE CONFIG
</button>

</div>

<div class="bottom-nav">

<div class="nav-item">
🏠<br>Home
</div>

<div class="nav-item active">
📝<br>V2ray
</div>

<div class="nav-item">
⚙️<br>Settings
</div>

<div class="nav-item">
ℹ️<br>About
</div>

</div>

<script>

function saveV2ray(){

const config = {

uuid:
document.getElementById("uuid").value,

mux:
document.getElementById("mux").checked,

network:
document.getElementById("network").value,

tls:
document.getElementById("tls").checked,

insecure:
document.getElementById("insecure").checked,

host:
document.getElementById("host").value,

path:
document.getElementById("path").value,

sni:
document.getElementById("sni").value

};

localStorage.setItem(
"vpnMode",
"V2RAY"
);

localStorage.setItem(
"v2rayConfig",
JSON.stringify(config)
);

alert("Configuration V2Ray sauvegardée");

}

</script>

</body>
</html>
